<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Primeira Via | Primeiro Motor Imóvel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cor-destaque: #ffffff;
            --cor-texto: #ffffff;
            --cor-secundario: #bbbbbb;
            --fundo: #0d0a04;
            --fundo-card: rgba(255,255,255,0.05);
            --borda: rgba(255,255,255,0.18);
            --transicao: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--fundo);
            color: var(--cor-texto);
            font-family: 'EB Garamond', serif;
            font-size: clamp(1.15rem, 2.5vw, 1.35rem);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .nav-item, .label {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        i { font-style: italic; }

        /* --- Barra de Progresso --- */
        #progressBar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--cor-destaque);
            z-index: 1001;
            transition: width 0.1s ease-out;
        }

        /* --- Hero Section --- */
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .hero-symbol {
            font-size: 3rem;
            margin-bottom: 2rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .category-line {
            font-size: 0.8rem;
            color: var(--cor-secundario);
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-style: italic;
            color: var(--cor-secundario);
            margin-bottom: 2rem;
        }

        .author-name {
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            border-top: 1px solid var(--borda);
            padding-top: 1rem;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: scaleY(1); opacity: 1; }
            40% { transform: scaleY(1.5); opacity: 0.5; }
        }

        /* --- Navegação --- */
        #mainNav {
            position: sticky;
            top: 0;
            background: rgba(13, 10, 4, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--borda);
            z-index: 1000;
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0 1rem;
        }

        #mainNav::-webkit-scrollbar { display: none; }

        .nav-item {
            padding: 1.2rem 1.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            color: var(--cor-secundario);
            transition: var(--transicao);
            border-bottom: 2px solid transparent;
        }

        .nav-item.active {
            color: var(--cor-destaque);
            border-bottom: 2px solid var(--cor-destaque);
        }

        /* --- Conteúdo Geral --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section {
            padding: 6rem 0;
            opacity: 0;
            transform: translateY(40px);
            transition: var(--transicao);
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Componentes --- */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4rem 0;
            opacity: 0.3;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--cor-texto);
        }

        .divider span { margin: 0 1.5rem; font-size: 1.2rem; }

        /* Card Grid */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .card {
            background: var(--fundo-card);
            border: 1px solid var(--borda);
            padding: 2.5rem;
            transition: var(--transicao);
        }

        .card:hover {
